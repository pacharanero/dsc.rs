site_name: dsc
site_description: Discourse CLI — manage multiple Discourse forums from the terminal.
site_url: https://pacharanero.github.io/dsc/
repo_url: https://github.com/pacharanero/dsc
repo_name: pacharanero/dsc
edit_uri: edit/main/docs/

theme:
  variant: modern
  # Light-mode variant by default; CSS in stylesheets/extra.css swaps to
  # `logo-dark.svg` under `[data-md-color-scheme="slate"]`.
  logo: assets/logo-light.svg
  favicon: assets/logo.svg
  features:
    - content.code.copy
    - content.code.annotate
    # Drop `navigation.tabs` to move top-level nav from the header tabs
    # into the left sidebar. `navigation.sections` keeps each top-level
    # entry rendered as a bold section heading rather than a collapsed
    # accordion.
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - toc.follow
  # Light/dark palette pair with a toggle in the header. The first entry
  # is the default scheme; clicking the toggle switches to the second
  # and remembers the choice via localStorage. `primary: custom` defers
  # the actual colour values to docs/stylesheets/extra.css so we can
  # match the logo's #f15c21 exactly.
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Getting started:
      - Configuration: configuration.md
      - Shell completions: completions.md
  - Content commands:
      - topic: topic.md
      - post: post.md
      - category: category.md
      - search: search.md
      - upload: upload.md
      - tag: tag.md
      - emoji: emoji.md
  - Users & access:
      - user: user.md
      - group: group.md
      - invite: invite.md
      - pm: pm.md
      - api-key: api-key.md
  - Install management:
      - list: list.md
      - add: add.md
      - import: import.md
      - open: open.md
      - update: update.md
      - config: config.md
  - Site admin:
      - setting: setting.md
      - backup: backup.md
      - theme: theme.md
      - plugin: plugin.md
      - palette: palette.md
  - Reports:
      - analytics: analytics.md
  - Provisioning:
      - harden: harden.md
  - Development: development.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:zensical.extensions.emoji.twemoji
      emoji_generator: !!python/name:zensical.extensions.emoji.to_svg

copyright: >-
  Copyright &copy; 2025–2026 Marcus Baw.
  Source <a href="https://github.com/pacharanero/dsc">pacharanero/dsc</a>.
